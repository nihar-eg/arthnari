<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArthNari — योजना</title>
<!--
  ArthNari — per-scheme detail page (opens in a new tab from the finder).
  Layout per Riddhima's walkthrough (26 Jun): form-download link · for whom ·
  account holder · key figures TABLE · "Needs for the scheme" · DISCLAIMER in
  a bold heading · benefits/pitch. Reads ?s=<id> from schemes.js.
-->
<style>
  :root{
    --primary:#7D1F2E; --accent:#D4A03D; --bg:#FBF7F0; --ink:#3D2817;
    --muted:#E8DCC8; --muted-fg:#6B5645; --card:#FFFFFF; --warn:#8a2323;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:-apple-system,"Segoe UI",Roboto,"Noto Sans Devanagari",sans-serif;
       background:var(--bg); color:var(--ink); font-size:18px; line-height:1.6;}
  header{position:sticky; top:0; background:var(--primary); color:#fff; padding:12px 16px;
         display:flex; align-items:center; justify-content:space-between; z-index:5;}
  header .brand{font-weight:700; font-size:20px; letter-spacing:.5px;}
  header .brand small{display:block; font-weight:400; font-size:12px; opacity:.9;}
  .langbtn{background:#fff; color:var(--primary); border:none; border-radius:20px;
           padding:8px 14px; font-size:15px; font-weight:700; cursor:pointer;}
  main{max-width:640px; margin:0 auto; padding:20px 14px 60px;}
  h1{font-size:26px; color:var(--primary); margin:10px 0 4px; line-height:1.3;}
  .short{font-size:18px; color:var(--muted-fg); margin-bottom:14px;}
  .freetag{display:inline-block; background:#2f6b45; color:#fff; font-size:14px; font-weight:700;
           border-radius:8px; padding:2px 10px; margin-left:6px; vertical-align:middle;}
  .formbtn{display:block; width:100%; text-align:center; background:var(--primary); color:#fff;
           font-size:18px; font-weight:700; padding:14px; border-radius:12px; text-decoration:none;
           margin:14px 0;}
  .formbtn.secondary{background:#fff; color:var(--primary); border:2px solid var(--primary);
           font-size:16px; padding:10px; margin:8px 0;}
  section{margin:22px 0;}
  h2{font-size:20px; color:var(--primary); border-bottom:2px solid var(--accent);
     padding-bottom:4px; margin-bottom:10px;}
  h2.disclaimer{color:var(--warn); border-color:var(--warn); font-size:21px;}
  .kv{font-size:18px; margin:6px 0;}
  .kv b{color:var(--primary);}
  table{width:100%; border-collapse:collapse; background:var(--card); border-radius:10px;
        overflow:hidden; box-shadow:0 1px 3px rgba(61,40,23,.12);}
  td{padding:11px 12px; border-bottom:1px solid var(--muted); vertical-align:top; font-size:16.5px;}
  tr:last-child td{border-bottom:none;}
  td.k{font-weight:700; width:42%; background:#fdfaf4; color:var(--primary);}
  ul.needs{list-style:none;}
  ul.needs li{background:var(--card); border:1px solid var(--muted); border-left:5px solid var(--accent);
      border-radius:10px; padding:10px 12px; margin:8px 0; font-size:17px;}
  .disc{background:#fdf0e3; border:1px solid #eecfa5; border-left:6px solid var(--warn);
        border-radius:10px; padding:14px; font-size:17px;}
  .pitch{background:var(--muted); border-radius:10px; padding:14px; font-style:italic; font-size:17px;}
  ol.steps{padding-left:24px;}
  ol.steps li{margin:9px 0; font-size:17px;}
  .src{font-size:15px; color:var(--muted-fg);}
  .src a{color:var(--primary);}
  .backlink{display:inline-block; margin-top:20px; color:var(--primary); font-weight:700;
            text-decoration:none; font-size:17px;}
  footer{background:var(--muted); font-size:13.5px; color:var(--muted-fg);
         padding:12px 16px; text-align:center; margin-top:30px;}
</style>
</head>
<body>
<header>
  <div class="brand">ArthNari <small id="hdrTag"></small></div>
  <button class="langbtn" id="langbtn"></button>
</header>
<main id="page"></main>
<footer id="foot"></footer>

<script src="schemes.js"></script>
<script>
let lang = localStorage.getItem('arthnari-lang') || 'hi';
const t = o => (o && (o[lang] !== undefined ? o[lang] : o)) || '';

const id = new URLSearchParams(location.search).get('s');
const S = SCHEMES[id];

function render(){
  document.documentElement.lang = lang;
  document.getElementById('hdrTag').textContent = t(STR.tag);
  document.getElementById('langbtn').textContent = t(STR.langBtn);
  document.getElementById('foot').textContent = t(STR.disclaimer);
  const el = document.getElementById('page');
  if(!S){ el.innerHTML = '<p>Scheme not found. <a href="index.html">← ArthNari</a></p>'; return; }
  document.title = 'ArthNari — ' + t(S.name);

  const isFree = (id==='pmmvy' || id==='jandhan');
  let h = `<h1>${t(S.name)}${isFree ? `<span class="freetag">${t(STR.free)}</span>` : ''}</h1>
           <div class="short">${t(S.short)}</div>`;

  if(S.form) h += `<a class="formbtn" href="${S.form}" download>${t(STR.formBtn)}</a>`;
  if(S.formsExtra) S.formsExtra.forEach(f=>{
    h += `<a class="formbtn secondary" href="${f.file}" download>📄 ${t(f.label)}</a>`;
  });

  h += `<section>
          <div class="kv"><b>${t(STR.forWhomH)}:</b> ${t(S.forWhom)}</div>
          <div class="kv"><b>${t(STR.acctH)}:</b> ${t(S.acct)}</div>
        </section>`;

  h += `<section><h2>${t(STR.figuresH)}</h2><table>` +
       S.figures.map(([k,v])=>`<tr><td class="k">${t(k)}</td><td>${t(v)}</td></tr>`).join('') +
       `</table></section>`;

  h += `<section><h2>${t(STR.needsH)}</h2><ul class="needs">` +
       S.needs.map(n=>`<li>${t(n)}</li>`).join('') + `</ul></section>`;

  h += `<section><h2 class="disclaimer">${t(STR.disclaimerH)}</h2>
        <div class="disc">${t(S.disclaimer)}</div></section>`;

  h += `<section><h2>${t(STR.benefitH)}</h2><div class="pitch">${t(S.pitch)}</div></section>`;

  h += `<section><h2>${t(STR.stepsH)}</h2><ol class="steps">` +
       S.steps.map(s=>`<li>${t(s)}</li>`).join('') + `</ol></section>`;

  h += `<section><h2>${t(STR.srcH)}</h2>` +
       S.sources.map(s=>`<div class="src">${s.url ? `<a href="${s.url}" target="_blank" rel="noopener">${s.label}</a>` : s.label}</div>`).join('') +
       `</section>`;

  h += `<a class="backlink" href="index.html">${t(STR.backHome)}</a>`;
  el.innerHTML = h;
}

document.getElementById('langbtn').onclick = ()=>{
  lang = (lang==='hi') ? 'en' : 'hi';
  localStorage.setItem('arthnari-lang', lang);
  render();
};
render();
</script>
</body>
</html>
