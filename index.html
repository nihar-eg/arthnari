<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arthable — योजना खोजें</title>
<!--
  Arthable — mock-up of the guided scheme-finder flow (v1, July 2026).
  Purpose: review the FLOW, not the final design or content — every scheme fact
  is marked PLACEHOLDER and will be replaced with verified information.
  By design: fully static, no backend, no personal data collected.
-->
<style>
  :root{
    --ink:#1f3a34; --accent:#e08a00; --accent-dark:#b26e00; --bg:#faf6ef;
    --bot:#ffffff; --user:#dff0e4; --line:#e3dccd; --warn:#8a2f2f; --good:#2f6b45;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:-apple-system,"Segoe UI",Roboto,"Noto Sans Devanagari",sans-serif;
       background:var(--bg); color:var(--ink); font-size:18px; line-height:1.55;}
  header{position:sticky; top:0; background:var(--ink); color:#fff; padding:12px 16px;
         display:flex; align-items:center; justify-content:space-between; z-index:5;}
  header .brand{font-weight:700; font-size:20px; letter-spacing:.5px;}
  header .brand small{display:block; font-weight:400; font-size:12px; opacity:.85;}
  .langbtn{background:#fff; color:var(--ink); border:none; border-radius:20px;
           padding:8px 14px; font-size:15px; font-weight:600; cursor:pointer;}
  main{max-width:560px; margin:0 auto; padding:16px 12px 120px;}
  .msg{max-width:88%; padding:12px 14px; border-radius:14px; margin:10px 0;
       box-shadow:0 1px 2px rgba(0,0,0,.06); animation:pop .18s ease-out;}
  @keyframes pop{from{transform:translateY(6px); opacity:0;} to{transform:none; opacity:1;}}
  .bot{background:var(--bot); border:1px solid var(--line); border-top-left-radius:4px;}
  .user{background:var(--user); margin-left:auto; border-top-right-radius:4px; font-weight:600;}
  .opts{display:flex; flex-wrap:wrap; gap:10px; margin:6px 0 14px;}
  .opts button{flex:1 1 45%; min-height:56px; font-size:18px; font-weight:600; color:var(--ink);
       background:#fff; border:2px solid var(--accent); border-radius:12px; cursor:pointer; padding:10px;}
  .opts button:active{background:var(--accent); color:#fff;}
  .card{background:#fff; border:1px solid var(--line); border-left:6px solid var(--accent);
        border-radius:12px; padding:14px; margin:12px 0;}
  .card h3{font-size:19px; margin-bottom:6px;}
  .card .open{margin-top:10px; width:100%; min-height:48px; font-size:17px; font-weight:700;
        background:var(--accent); border:none; border-radius:10px; color:#fff; cursor:pointer;}
  .detail h2{font-size:22px; margin:6px 0 10px;}
  .block{border-radius:10px; padding:12px; margin:12px 0; font-size:17px;}
  .benefit{background:#eaf4ec; border:1px solid #bcd8c4;}
  .fine{background:#fbeaea; border:1px solid #e3bcbc;}
  .fine strong{color:var(--warn);}
  .steps{background:#fff; border:1px solid var(--line);}
  .steps ol{padding-left:22px;}
  .steps li{margin:8px 0;}
  .src{font-size:14px; color:#6b6455; margin-top:8px;}
  .backbtn,.againbtn{width:100%; min-height:50px; margin-top:10px; font-size:17px; font-weight:600;
        border-radius:10px; cursor:pointer; border:2px solid var(--ink); background:#fff; color:var(--ink);}
  .speak{background:none; border:2px solid var(--line); border-radius:50%; width:44px; height:44px;
         font-size:20px; cursor:pointer; vertical-align:middle; margin-left:8px; opacity:.45;}
  .ph{display:inline-block; background:#fff3cd; color:#7a5c00; border:1px dashed #d9b64a;
      font-size:12px; font-weight:700; padding:1px 7px; border-radius:8px; letter-spacing:.4px;}
  footer{position:fixed; bottom:0; left:0; right:0; background:#efe9dd; border-top:1px solid var(--line);
         font-size:13px; color:#6b6455; padding:8px 14px; text-align:center;}
  footer a{color:var(--ink);}
</style>
</head>
<body>
<header>
  <div class="brand">Arthable <small data-i18n="tag">आपके हक़ की योजनाएँ, साफ़ भाषा में</small></div>
  <button class="langbtn" id="langbtn" onclick="toggleLang()">English</button>
</header>

<main id="chat"></main>

<footer>
  <span data-i18n="disclaimer">यह वेबसाइट केवल जानकारी के लिए है। हम कोई खाता नहीं खोलते, कोई पैसा नहीं लेते, और आपकी कोई निजी जानकारी नहीं माँगते।</span>
  · <a href="#" onclick="alert('TODO: About page (Slice 4)')" data-i18n="about">परियोजना के बारे में</a>
  · <a href="#" onclick="alert('TODO: Sources page (Slice 4)')" data-i18n="sources">स्रोत</a>
</footer>

<script>
// ---------------------------------------------------------------------------
// UI strings (hi = default; en toggle). Real copy is Riddhima's (SoW §5).
// ---------------------------------------------------------------------------
let lang = 'hi';
const T = {
  tag:       {hi:'आपके हक़ की योजनाएँ, साफ़ भाषा में', en:'Your schemes, in plain words'},
  hello:     {hi:'नमस्ते! 🙏 मैं आपकी मदद के लिए हूँ। तीन छोटे सवालों के जवाब दीजिए — मैं बताऊँगी कि सरकार की कौन-सी योजनाएँ आपके काम की हैं।',
              en:'Hello! 🙏 I am here to help. Answer three small questions and I will show which government schemes can help you.'},
  start:     {hi:'शुरू करें', en:'Start'},
  q_age:     {hi:'आपकी उम्र किस बीच में है?', en:'What is your age group?'},
  q_income:  {hi:'आपके घर की महीने की कमाई लगभग कितनी है?', en:'Roughly how much does your household earn per month?'},
  q_situ:    {hi:'इनमें से आपकी स्थिति कौन-सी है? (एक चुनिए)', en:'Which of these fits your situation? (pick one)'},
  s_daughter:{hi:'मेरी बेटी 10 साल से छोटी है', en:'I have a daughter under 10'},
  s_pregnant:{hi:'मैं गर्भवती हूँ / नई माँ हूँ', en:'I am pregnant / a new mother'},
  s_save:    {hi:'मैं बचत करना चाहती हूँ', en:'I want to save money'},
  results0:  {hi:'अभी इन जवाबों के लिए कोई योजना नहीं मिली। कृपया किसी सहायता-कार्यकर्ता से बात कीजिए।',
              en:'No matching scheme found for these answers. Please talk to a support worker.'},
  results:   {hi:'आपके लिए ये योजनाएँ मिलीं 👇', en:'Here are schemes for you 👇'},
  openBtn:   {hi:'पूरी जानकारी देखें', en:'See full details'},
  benefitH:  {hi:'✅ आपको क्या मिलेगा', en:'✅ What you get'},
  fineH:     {hi:'⚠️ ध्यान रखने वाली बात (छिपी शर्त)', en:'⚠️ The fine print (hidden condition)'},
  stepsH:    {hi:'📋 आवेदन कैसे करें', en:'📋 How to apply'},
  srcH:      {hi:'स्रोत:', en:'Source:'},
  back:      {hi:'← योजनाओं की सूची पर वापस', en:'← Back to schemes'},
  again:     {hi:'फिर से शुरू करें', en:'Start again'},
  ageA:{hi:'18 से कम', en:'Under 18'}, ageB:{hi:'18 – 40', en:'18 – 40'},
  ageC:{hi:'40 – 60', en:'40 – 60'},  ageD:{hi:'60 से ऊपर', en:'Over 60'},
  incA:{hi:'INR 10,000 से कम', en:'Under INR 10,000'}, incB:{hi:'INR 10,000 – 25,000', en:'INR 10,000 – 25,000'},
  incC:{hi:'INR 25,000 से ज़्यादा', en:'Over INR 25,000'},
  disclaimer:{hi:'यह वेबसाइट केवल जानकारी के लिए है। हम कोई खाता नहीं खोलते, कोई पैसा नहीं लेते, और आपकी कोई निजी जानकारी नहीं माँगते।',
              en:'This website is for information only. We do not open accounts, take money, or ask for any personal details.'},
  about:{hi:'परियोजना के बारे में', en:'About the project'}, sources:{hi:'स्रोत', en:'Sources'},
  ph:{hi:'नमूना — असली जानकारी जाँच के बाद आएगी', en:'PLACEHOLDER — verified content pending'}
};
const t = k => (T[k] && T[k][lang]) || k;

// ---------------------------------------------------------------------------
// PLACEHOLDER scheme data — every fact below is a stand-in. Riddhima authors +
// verifies the real set against official sources (SoW §9.1). Shape is final:
// {id, match(answers), name, benefit, fine, steps[], source} — all bilingual.
// ---------------------------------------------------------------------------
const SCHEMES = [
  {
    id:'girl-child',
    match:a => a.situ==='daughter',
    name:   {hi:'बेटी बचत योजना (नमूना)', en:'Girl-Child Savings Scheme (PLACEHOLDER)'},
    benefit:{hi:'बेटी की पढ़ाई/शादी के लिए लंबी बचत — जमा पैसे पर सरकार अच्छा ब्याज देती है। (PLACEHOLDER आँकड़े)',
             en:'Long-term savings for your daughter with strong government interest. (PLACEHOLDER figures)'},
    fine:   {hi:'हर साल एक छोटी रक़म जमा करना ज़रूरी है — चूकने पर खाता बंद हो सकता है और जुर्माना लगता है। (PLACEHOLDER — असली शर्त जाँचें)',
             en:'A minimum deposit is required every year — missing it can freeze the account and cost a penalty. (PLACEHOLDER — verify the real condition)'},
    steps:  [
      {hi:'बेटी का जन्म प्रमाण-पत्र और अपना आधार लेकर जाएँ (PLACEHOLDER)', en:'Take your daughter’s birth certificate and your Aadhaar (PLACEHOLDER)'},
      {hi:'नज़दीकी डाकघर या बैंक जाएँ', en:'Visit the nearest post office or bank'},
      {hi:'फ़ॉर्म भरकर पहली जमा राशि दें (PLACEHOLDER राशि)', en:'Fill the form and make the first deposit (PLACEHOLDER amount)'}
    ],
    source: {hi:'भारत सरकार — आधिकारिक पृष्ठ (TODO: असली लिंक)', en:'Government of India — official page (TODO: real link)'}
  },
  {
    id:'mother-support',
    match:a => a.situ==='pregnant',
    name:   {hi:'मातृ सहायता योजना (नमूना)', en:'Maternity Support Scheme (PLACEHOLDER)'},
    benefit:{hi:'पहले बच्चे के समय माँ को किस्तों में सीधी आर्थिक मदद। (PLACEHOLDER राशि)',
             en:'Direct cash support for a first-time mother, paid in instalments. (PLACEHOLDER amount)'},
    fine:   {hi:'किस्तें अपने-आप नहीं आतीं — हर किस्त के लिए टीकाकरण/जाँच का प्रमाण देना होता है। (PLACEHOLDER — असली शर्त जाँचें)',
             en:'Instalments are not automatic — each needs proof of check-ups/vaccination. (PLACEHOLDER — verify the real condition)'},
    steps:  [
      {hi:'आंगनवाड़ी दीदी या ASHA कार्यकर्ता से मिलें', en:'Meet your Anganwadi or ASHA worker'},
      {hi:'माँ-बच्चा कार्ड बनवाएँ (PLACEHOLDER)', en:'Get the mother-child card made (PLACEHOLDER)'},
      {hi:'बैंक खाता आधार से जुड़ा होना चाहिए', en:'Your bank account must be linked to Aadhaar'}
    ],
    source: {hi:'भारत सरकार — आधिकारिक पृष्ठ (TODO: असली लिंक)', en:'Government of India — official page (TODO: real link)'}
  },
  {
    id:'small-savings',
    match:a => a.situ==='save' || a.income!=='incC',
    name:   {hi:'छोटी बचत योजना (नमूना)', en:'Small Savings Scheme (PLACEHOLDER)'},
    benefit:{hi:'रोज़ INR 1–2 जितनी छोटी बचत से भी कुछ सालों में अच्छी रक़म बनती है। (PLACEHOLDER गणित)',
             en:'Even saving INR 1–2 a day grows into a meaningful amount over a few years. (PLACEHOLDER arithmetic)'},
    fine:   {hi:'खाते में हर महीने कम-से-कम रक़म रखनी होती है — नहीं तो योजना रद्द हो सकती है और जमा पैसा फँस सकता है। (PLACEHOLDER — असली शर्त जाँचें)',
             en:'A minimum monthly balance is required — otherwise the scheme can lapse and your money gets stuck. (PLACEHOLDER — verify the real condition)'},
    steps:  [
      {hi:'अपने बैंक की शाखा जाएँ जहाँ खाता है', en:'Visit the bank branch where you hold your account'},
      {hi:'योजना का नाम लेकर फ़ॉर्म माँगें (PLACEHOLDER)', en:'Ask for the scheme form by name (PLACEHOLDER)'},
      {hi:'ऑटो-डेबिट चालू करवाएँ ताकि किस्त कभी न छूटे', en:'Set up auto-debit so an instalment is never missed'}
    ],
    source: {hi:'भारत सरकार — आधिकारिक पृष्ठ (TODO: असली लिंक)', en:'Government of India — official page (TODO: real link)'}
  }
];

// ---------------------------------------------------------------------------
// Chat flow engine — predetermined steps, no free text, no data leaves the page.
// ---------------------------------------------------------------------------
const chat = document.getElementById('chat');
const answers = {};

function bot(html){ const d=document.createElement('div'); d.className='msg bot'; d.innerHTML=html; chat.appendChild(d); scroll(); }
function user(text){ const d=document.createElement('div'); d.className='msg user'; d.textContent=text; chat.appendChild(d); scroll(); }
function options(list){ // list: [{label, cb}]
  const w=document.createElement('div'); w.className='opts';
  list.forEach(o=>{ const b=document.createElement('button'); b.textContent=o.label;
    b.onclick=()=>{ w.remove(); user(o.label); o.cb(); }; w.appendChild(b); });
  chat.appendChild(w); scroll();
}
function scroll(){ window.scrollTo({top:document.body.scrollHeight, behavior:'smooth'}); }
function speakStub(){ return '<button class="speak" title="TODO: audio clips (Slice 5)" onclick="alert(\'TODO: recorded audio plays here (Slice 5)\')">🔊</button>'; }

function stepWelcome(){
  chat.innerHTML='';
  bot(t('hello')+speakStub());
  options([{label:t('start'), cb:stepAge}]);
}
function stepAge(){
  bot(t('q_age')+speakStub());
  options(['ageA','ageB','ageC','ageD'].map(k=>({label:t(k), cb:()=>{answers.age=k; stepIncome();}})));
}
function stepIncome(){
  bot(t('q_income')+speakStub());
  options(['incA','incB','incC'].map(k=>({label:t(k), cb:()=>{answers.income=k; stepSituation();}})));
}
function stepSituation(){
  bot(t('q_situ')+speakStub());
  options([
    {label:t('s_daughter'), cb:()=>{answers.situ='daughter'; stepResults();}},
    {label:t('s_pregnant'), cb:()=>{answers.situ='pregnant'; stepResults();}},
    {label:t('s_save'),     cb:()=>{answers.situ='save';     stepResults();}}
  ]);
}
function stepResults(){
  const hits = SCHEMES.filter(s=>s.match(answers));
  bot(hits.length ? t('results') : t('results0'));
  hits.forEach(s=>{
    const c=document.createElement('div'); c.className='card';
    c.innerHTML = `<span class="ph">${t('ph')}</span><h3>${s.name[lang]}</h3><div>${s.benefit[lang]}</div>`;
    const b=document.createElement('button'); b.className='open'; b.textContent=t('openBtn');
    b.onclick=()=>stepDetail(s); c.appendChild(b); chat.appendChild(c);
  });
  const again=document.createElement('button'); again.className='againbtn';
  again.textContent=t('again'); again.onclick=stepWelcome; chat.appendChild(again); scroll();
}
function stepDetail(s){
  chat.innerHTML='';
  const d=document.createElement('div'); d.className='detail';
  d.innerHTML =
    `<span class="ph">${t('ph')}</span>
     <h2>${s.name[lang]} ${speakStub()}</h2>
     <div class="block benefit"><strong>${t('benefitH')}</strong><br>${s.benefit[lang]}</div>
     <div class="block fine"><strong>${t('fineH')}</strong><br>${s.fine[lang]}</div>
     <div class="block steps"><strong>${t('stepsH')}</strong>
       <ol>${s.steps.map(st=>`<li>${st[lang]}</li>`).join('')}</ol></div>
     <div class="src">${t('srcH')} ${s.source[lang]}</div>`;
  chat.appendChild(d);
  const back=document.createElement('button'); back.className='backbtn'; back.textContent=t('back');
  back.onclick=()=>{ chat.innerHTML=''; stepResults(); };
  chat.appendChild(back);
  const again=document.createElement('button'); again.className='againbtn'; again.textContent=t('again');
  again.onclick=stepWelcome; chat.appendChild(again);
  window.scrollTo({top:0});
}

function toggleLang(){
  lang = (lang==='hi') ? 'en' : 'hi';
  document.getElementById('langbtn').textContent = (lang==='hi') ? 'English' : 'हिन्दी';
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el=>{ el.textContent = t(el.dataset.i18n); });
  stepWelcome(); // restart flow in the new language (mock-up behaviour)
}

stepWelcome();
</script>
</body>
</html>
